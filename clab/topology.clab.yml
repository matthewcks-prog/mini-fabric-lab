name: mini-fabric-lab

topology:
  nodes:
    spine1:
      kind: linux
      image: quay.io/frrouting/frr:10.5.1
      binds:
        - ../configs/frr/spine1/daemons:/etc/frr/daemons
        - ../configs/frr/spine1/frr.conf:/etc/frr/frr.conf
        - ../configs/frr/spine1/vtysh.conf:/etc/frr/vtysh.conf

    spine2:
      kind: linux
      image: quay.io/frrouting/frr:10.5.1
      binds:
        - ../configs/frr/spine2/daemons:/etc/frr/daemons
        - ../configs/frr/spine2/frr.conf:/etc/frr/frr.conf
        - ../configs/frr/spine2/vtysh.conf:/etc/frr/vtysh.conf

    leaf1:
      kind: linux
      image: quay.io/frrouting/frr:10.5.1
      binds:
        - ../configs/frr/leaf1/daemons:/etc/frr/daemons
        - ../configs/frr/leaf1/frr.conf:/etc/frr/frr.conf
        - ../configs/frr/leaf1/vtysh.conf:/etc/frr/vtysh.conf

    leaf2:
      kind: linux
      image: quay.io/frrouting/frr:10.5.1
      binds:
        - ../configs/frr/leaf2/daemons:/etc/frr/daemons
        - ../configs/frr/leaf2/frr.conf:/etc/frr/frr.conf
        - ../configs/frr/leaf2/vtysh.conf:/etc/frr/vtysh.conf

    edge1:
      kind: linux
      image: quay.io/frrouting/frr:10.5.1
      binds:
        - ../configs/frr/edge1/daemons:/etc/frr/daemons
        - ../configs/frr/edge1/frr.conf:/etc/frr/frr.conf
        - ../configs/frr/edge1/vtysh.conf:/etc/frr/vtysh.conf

    h1:
      kind: linux
      image: ghcr.io/hellt/network-multitool
      binds:
        - ../configs/hosts/h1.sh:/h1.sh
      exec:
        - /bin/sh /h1.sh

    h2:
      kind: linux
      image: ghcr.io/hellt/network-multitool
      binds:
        - ../configs/hosts/h2.sh:/h2.sh
      exec:
        - /bin/sh /h2.sh

  links:
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
    - endpoints: ["spine2:eth1", "leaf1:eth2"]
    - endpoints: ["spine2:eth2", "leaf2:eth2"]

    - endpoints: ["spine1:eth3", "edge1:eth1"]
    - endpoints: ["spine2:eth3", "edge1:eth2"]

    - endpoints: ["leaf1:eth3", "h1:eth1"]
    - endpoints: ["leaf2:eth3", "h2:eth1"]