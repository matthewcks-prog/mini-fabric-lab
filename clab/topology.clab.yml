name: stage1ospf

topology:
  groups:
    routers:
      kind: linux
      image: quay.io/frrouting/frr:10.5.1

    hosts:
      kind: linux
      image: nicolaka/netshoot:latest

  nodes:
    r1:
      group: routers
      binds:
        - ../configs/frr/r1/daemons:/etc/frr/daemons
        - ../configs/frr/r1/frr.conf:/etc/frr/frr.conf

    r2:
      group: routers
      binds:
        - ../configs/frr/r2/daemons:/etc/frr/daemons
        - ../configs/frr/r2/frr.conf:/etc/frr/frr.conf

    h1:
      group: hosts
      binds:
        - ../configs/hosts/h1.sh:/h1.sh
      exec:
        - sh /h1.sh

    h2:
      group: hosts
      binds:
        - ../configs/hosts/h2.sh:/h2.sh
      exec:
        - sh /h2.sh

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r1:eth2", "h1:eth1"]
    - endpoints: ["r2:eth2", "h2:eth1"]